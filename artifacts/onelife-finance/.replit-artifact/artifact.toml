kind = "web"
previewPath = "/"
title = "OneLife Finance"
version = "1.0.0"
id = "artifacts/onelife-finance"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25853

[services.development]
run = "pnpm --filter @workspace/onelife-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onelife-finance", "run", "build" ]
serve = "static"
publicDir = "artifacts/onelife-finance/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25853"
BASE_PATH = "/"
