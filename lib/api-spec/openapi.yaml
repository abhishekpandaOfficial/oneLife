components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TransactionType:
      type: string
      enum: [income, expense]

    EmiStatus:
      type: string
      enum: [paid, pending, overdue, partial]

    LoanType:
      type: string
      enum: [home, car, personal, gold, education, other]

    LoanStatus:
      type: string
      enum: [active, closed]

    InsuranceType:
      type: string
      enum: [health, life, car, house, term]

    InsuranceStatus:
      type: string
      enum: [active, expired]

    InvestmentType:
      type: string
      enum: [mutual_fund, stocks, ppf, nps, fd, gold, crypto]

    GoalType:
      type: string
      enum: [emergency_fund, vacation, car, house, kids_education, retirement, other]

    WorkEmploymentType:
      type: string
      enum: [full_time, part_time, contract, internship, freelance]

    WorkDocumentType:
      type: string
      enum: [offer_letter, payslip, joining_letter, hike_letter, relieving_letter, form16, pf_statement, other]

    WorkPfSource:
      type: string
      enum: [manual, estimated, epfo]

    Category:
      type: object
      required: [id, name, type, color, createdAt]
      properties:
