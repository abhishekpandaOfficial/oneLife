  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: List budgets for a month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            description: "Month in YYYY-MM format"
      responses:
        "200":
          description: List of budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: Create a budget line
      requestBody:
        required: true
        content:
          application/json:
            schema:
