          description: Deleted
        "404":
          description: Not found

  /reports/summary:
    get:
      operationId: getReportSummary
      tags: [reports]
      summary: Get a financial report summary
      description: Returns income/expense/category breakdown and trends over the requested period
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [monthly, yearly]
      responses:
        "200":
          description: Report summary
          content:
            application/json:
              schema:
