  /onework/summary:
    get:
      operationId: getOneworkSummary
      tags: [onework]
      summary: Get OneWork summary
      responses:
        "200":
          description: OneWork summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneworkSummary"

  /onework/profile:
