      operationId: createWorkPfWithdrawal
      tags: [onework]
      summary: Create a PF withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkPfWithdrawalInput"
      responses:
